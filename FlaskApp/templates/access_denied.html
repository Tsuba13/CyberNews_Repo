<!DOCTYPE html>

<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
	    <title>CyberNews - Access Denied</title>
	</head>
	<body>
		<header>
            <div class="header-left">
				<a href="{{ url_for('root') }}" class="btn-home">Home</a>
			</div>
			<p class="MainTitle">Access Denied!</p>
            {% if session.get('user_id') %}
            <div class="header-right">
                <span class="user-info">{{ session.username }} ({{ session.role }})</span>
                <a href="{{ url_for('logout') }}" class="btn-logout">Log Out</a>
            </div>
		{% endif %}
		</header>
		<h2>You are not authorized to access this page.</h2>
		<div class="button-section">
			<a href="{{ url_for('news') }}" class="btn-news">Back to News</a>
		</div>
		<footer>
			<small>&copy; CyberNews Tracker TradeMedia</small>
			{% if session.get('role') == 'admin' %}
			<div class="footer-right">
				<a href="{{ url_for('admin_dashboard') }}" class="btn-admin-footer" target="_self">Admin Dashboard</a>
			</div>
			{% endif %}
		</footer>
	</body>
</html>
