<!DOCTYPE html>

<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
	    <title>CyberNews - Success!</title>
	</head>
	<body>
		<header>
				<p class="MainTitle">Your message has successfully reached us, {{ data.name }}. Thank you for contacting us!</p>
		</header>
		<div class="result-container">
    <h3>Submitted Details:</h3>
    <div class="detail-row">
        <span class="detail-label">Name:</span>
        <span class="detail-value">{{ data.name }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Age:</span>
        <span class="detail-value">{{ data.age }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Gender:</span>
        <span class="detail-value">{{ data.gender }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Title:</span>
        <span class="detail-value">{{ data.title }}</span>
    </div>
    <div class="detail-row">
        <span class="detail-label">Message:</span>
        <span class="detail-value">{{ data.message }}</span>
    </div>
</div>
		<div class="button-section">
			<a href="{{ url_for('root') }}" class="btn-news">Go back to home</a>
		</div>
		<footer>
			<small>© CyberNews Tracker TradeMedia</small>
		</footer>
	</body>
