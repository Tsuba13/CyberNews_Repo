<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
		<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
		<title>CyberNews - News</title>
	</head>
	<body>
		<header>
			<div class="header-left">
				<a href="{{ url_for('root') }}" class="btn-home" target="_self">Home</a>
			</div>
		<p class="MainTitle">CyberNews</p>
		<nav>
			<ul>
				<li class="Gaps"><a href="{{ url_for('about') }}">About</a><li>
				<li class="Gaps"><a href="{{ url_for('contact') }}">Contact us</a><li>
				<li class="Gaps"><a href="{{ url_for('news_live') }}">Live</a><li></li>
			</ul>
		</nav>
		{% if session.get('user_id') %}
		<div class="header-right">
			<span class="user-info">{{ session.username }} ({{ session.role }})</span>
			<a href="{{ url_for('logout') }}" class="btn-logout">Log Out</a>
		</div>
		{% endif %}
		</header>
		<main>
			<h1><p>Greeting message here.</p></h1>
			  <button id="RefreshButton">Refresh Headlines</button>
			<section id="HeadlinesContainer"></section>
		</main>
		<footer>
			<small>&copy; CyberNews Tracker TradeMedia</small>
			{% if session.get('role') == 'admin' %}
			<div class="footer-right">
				<a href="{{ url_for('admin_dashboard') }}" class="btn-admin-footer" target="_self">Admin Dashboard</a>
			</div>
			{% endif %}
		</footer>
		<script src="{{ url_for('static', filename='Greeting.js') }}"></script>
		<script src="{{ url_for('static', filename='Refresher.js') }}"></script>
	</body>
</html>
