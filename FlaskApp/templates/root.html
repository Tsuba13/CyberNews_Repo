<!DOCTYPE html>

<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
	    <title>CyberNews - Home</title>
	</head>
	<body>
		<header>
				<p class="MainTitle">Welcome to CyberNews!</p>
		</header>

		<div class="login-section">
			<h2>Member Login</h2>
			<form action="{{ url_for('login') }}" method="POST">
				<div class="form-group">
					<label for="username">Username:</label>
					<input type="text" id="username" name="username" placeholder="Enter username" required>
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" id="password" name="password" placeholder="Enter password" required>
				</div>
				<button type="submit" id="send-msg-btn">Log In</button>
				<div class="button-section">
				<h4>Don't have an account yet?</h4>
					<a href="{{ url_for('register') }}" class="btn-news">Sign Up</a>
				</div>
			</form>
		</div>

		<div id="cookie-notice" class="cookie-notice">
			This site uses essential cookies for login functionality.
		</div>
		<script src="{{ url_for('static', filename='CookieNoticePopup.js') }}"></script>
	</body>
</html>
