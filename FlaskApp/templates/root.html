<!DOCTYPE html>

<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
	    <title>CyberNews - Home</title>
	</head>
	<body>
		<header>
				<p class="MainTitle">Welcome to CyberNews!</p>
		</header>

		{% if session.get('user_id') %}
		<div class="logged-in-section">
			<h2>Welcome back, {{ session.username }}!</h2>
			<div class="button-section">
				<a href="{{ url_for('news') }}" class="btn-news">News</a>
			</div>
			<div class="button-section">
				<a href="{{ url_for('logout') }}" class="btn-news">Log Out</a>
			</div>
		</div>
		{% else %}
		<div class="login-section">
			<h2>Member Login</h2>
			<form action="{{ url_for('login') }}" method="POST">
				<div class="form-group">
					<label for="username">Username</label>
					<input type="text" id="username" name="username" placeholder="Enter username" required>
				</div>
				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter password" required>
				</div>
				{% if error %}
				<div class="error-message">
					{{ error }}
				</div>
				{% endif %}
				<button type="submit" id="send-msg-btn">Log In</button>
				<div class="button-section">
					<a href="{{ url_for('register') }}" class="btn-news">Sign Up</a>
				</div>
			</form>
		</div>
		{% endif %}

		<div id="cookie-notice" class="cookie-notice">
			This site uses essential cookies for login functionality.
		</div>

		<script>
			setTimeout(function() {
				var notice = document.getElementById('cookie-notice');
				if (notice) {
					notice.style.opacity = '0';
					setTimeout(function() {
						notice.style.display = 'none';
					}, 500);
				}
			}, 4000);
		</script>

		<footer>
			<small>© CyberNews Tracker TradeMedia</small>
		</footer>
	</body>
</html>
