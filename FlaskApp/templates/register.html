<!DOCTYPE html>

<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
	    <title>CyberNews - Sign Up</title>
	</head>
	<body>
		<header>
			<div class="header-left">
				<a href="{{ url_for('root') }}" class="btn-home">Home</a>
			</div>
			<p class="MainTitle">Create Your Account</p>
		</header>

		<div class="form-container">
			<h2>Registration Form</h2>
			<form action="{{ url_for('register') }}" method="POST">
				<div class="form-group">
					<label for="username">Username*</label>
					<input type="text" id="username" name="username" placeholder="Choose a username" required>
				</div>
				<div class="form-group">
					<label for="password">Password*</label>
					<input type="password" id="password" name="password" placeholder="Create a password" required>
				</div>
				<div class="form-group">
					<label for="confirm_password">Confirm Password*</label>
					<input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
				</div>
				{% if error %}
				<div class="error-message">
					{{ error }}
				</div>
				{% endif %}
				<button type="submit" id="send-msg-btn">Sign Up</button>
			</form>
		</div>

		<footer>
			<small>&copy; CyberNews Tracker TradeMedia</small>
		</footer>
	</body>
</html>
